<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobRadar Design System</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="jr-app">
    <div class="jr-shell">
      <!-- Top Bar -->
      <header class="jr-topbar">
        <div class="jr-topbar__left">
          <span class="jr-app-name">JobRadar</span>
        </div>
        <div class="jr-topbar__center">
          <span class="jr-progress">Step 1 / 5</span>
        </div>
        <div class="jr-topbar__right">
          <span class="jr-status-badge jr-status-badge--neutral">Not started</span>
        </div>
      </header>

      <!-- Shared Navigation -->
      <nav class="jr-nav" aria-label="Primary navigation">
        <div class="jr-nav__inner">
          <button
            class="jr-nav__toggle"
            type="button"
            aria-expanded="false"
            aria-controls="jr-nav-menu"
          >
            <span class="jr-nav__toggle-icon" aria-hidden="true">
              <span class="jr-nav__toggle-bar"></span>
              <span class="jr-nav__toggle-bar"></span>
              <span class="jr-nav__toggle-bar"></span>
            </span>
            <span class="jr-nav__toggle-label">Menu</span>
          </button>
          <ul class="jr-nav__links" id="jr-nav-menu">
            <li>
              <a href="/dashboard" data-route="/dashboard" class="jr-nav__link"
                >Dashboard</a
              >
            </li>
            <li>
              <a href="/saved" data-route="/saved" class="jr-nav__link">Saved</a>
            </li>
            <li>
              <a href="/digest" data-route="/digest" class="jr-nav__link"
                >Digest</a
              >
            </li>
            <li>
              <a href="/settings" data-route="/settings" class="jr-nav__link"
                >Settings</a
              >
            </li>
            <li>
              <a href="/proof" data-route="/proof" class="jr-nav__link">Proof</a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Context Header -->
      <section class="jr-context-header">
        <div class="jr-context-header__content">
          <h1 class="jr-heading-xl" id="jr-page-title"></h1>
          <p class="jr-body-lg" id="jr-page-subtitle"></p>
        </div>
      </section>

      <!-- Main Content -->
      <main class="jr-main">
        <section class="jr-main__primary">
          <div class="jr-route-placeholder" aria-live="polite">
            <h2 class="jr-heading-md" id="jr-route-heading"></h2>
            <p class="jr-body-sm" id="jr-route-subtext"></p>
          </div>
        </section>

        <aside class="jr-main__secondary">
          <div class="jr-route-secondary-placeholder"></div>
        </aside>
      </main>

      <!-- Proof Footer -->
      <footer class="jr-footer">
        <div class="jr-footer__content">
          <span class="jr-footer__label jr-body-xs">Proof checklist</span>
          <ul class="jr-footer__checklist jr-body-xs">
            <li><span aria-hidden="true">□</span> UI Built</li>
            <li><span aria-hidden="true">□</span> Logic Working</li>
            <li><span aria-hidden="true">□</span> Test Passed</li>
            <li><span aria-hidden="true">□</span> Deployed</li>
          </ul>
        </div>
      </footer>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
